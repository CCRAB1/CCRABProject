{% load static %}

<div
  id="{{ carousel_id }}"
  class="bc-carousel platform-panel"
  x-data="platformCarousel({
    slideCount: {{ images|length }},
    autoplay: {% if autoplay %}true{% else %}false{% endif %},
    interval: {{ interval }},
    loop: {% if loop %}true{% else %}false{% endif %},
    pauseOnHover: {% if pause_on_hover %}true{% else %}false{% endif %}
  })"
  @mouseenter="pause()"
  @mouseleave="resume()"
  @focusin="pause()"
  @focusout="resume()"
  aria-label="{{ aria_label }}"
  style="
    --bc-carousel-items-mobile: {{ items_mobile }};
    --bc-carousel-items-tablet: {{ items_tablet }};
    --bc-carousel-items-desktop: {{ items_desktop }};
    --bc-carousel-gap: {{ gap }};
  "
>

  {% if images %}
  {% if show_nav %}
    <div class="bc-carousel__nav" aria-hidden="false">
      <button
        type="button"
        class="button is-light is-small"
        @click="previous()"
        :disabled="!loop && activeIndex === 0"
        aria-label="Previous"
      >
        <span aria-hidden="true">‹</span>
      </button>

      <button
        type="button"
        class="button is-light is-small"
        @click="next()"
        :disabled="!loop && activeIndex >= slideCount - 1"
        aria-label="Next"
      >
        <span aria-hidden="true">›</span>
      </button>
    </div>
  {% endif %}

  <div
    class="bc-carousel__viewport"
    x-ref="viewport"
    tabindex="0"
    role="group"
    aria-roledescription="carousel"
    @keydown.arrow-left.prevent="previous()"
    @keydown.arrow-right.prevent="next()"
    @pointerdown="restartAutoplay()"
    @touchstart="restartAutoplay()"
    @wheel="restartAutoplay()"
    @scroll="scheduleScrollUpdate()"
    @resize.window="scheduleScrollUpdate(); restartAutoplay(250)"
    @visibilitychange.document="document.hidden ? stopAutoplay() : startAutoplay()"
  >
    {% for img in images %}
      <div class="bc-carousel__slide" data-carousel-slide data-index="{{ forloop.counter0 }}">
        <figure class="image is-{{ aspect_ratio }}">
          {% if img.href %}<a href="{{ img.href }}">{% endif %}
            <img
              src="{{ img.filepath }}"
              alt="{{ img.description|default:'' }}"
              {% if img.srcset %}srcset="{{ img.srcset }}"{% endif %}
              {% if img.sizes %}sizes="{{ img.sizes }}"{% endif %}
              loading="{{ img.loading|default:'lazy' }}"
              decoding="async"
            >
          {% if img.href %}</a>{% endif %}
        </figure>

        {% if img.caption %}
          <p class="has-text-centered is-size-7 mt-2">{{ img.caption }}</p>
        {% endif %}
      </div>
    {% endfor %}
  </div>

  {% if show_dots %}
    <div class="bc-carousel__dots buttons is-centered mt-3" data-carousel-dots aria-label="Slide navigation">
      {% for _ in images %}
        <button
          type="button"
          class="button is-small bc-carousel__dot"
          @click="goTo({{ forloop.counter0 }})"
          :class="{
            'is-primary': activeIndex === {{ forloop.counter0 }},
            'is-light': activeIndex !== {{ forloop.counter0 }}
          }"
          :aria-current="activeIndex === {{ forloop.counter0 }} ? 'true' : 'false'"
          aria-label="Go to slide {{ forloop.counter }}"
        ></button>
      {% endfor %}
    </div>
  {% endif %}
  {% else %}
    <div class="platform-empty-media has-text-centered p-5">
      <p class="has-text-grey">No platform images available.</p>
    </div>
  {% endif %}
</div>
