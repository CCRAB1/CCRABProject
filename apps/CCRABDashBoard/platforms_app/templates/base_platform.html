{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- preload fonts -->
    <link rel="preload" href="{% static 'fonts/montserrat/Montserrat-Regular.woff2' %}" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="{% static 'fonts/roboto-slab/RobotoSlab-Regular.woff2' %}" as="font" type="font/woff2" crossorigin>

    <link rel="stylesheet" href="{% static 'css/fonts.css' %}">
    <link rel="stylesheet" href="{% static 'css/bulma/css/versions/bulma-no-dark-mode.css' %}">
    <!-- override to make Bulma use our fonts -->
    <link rel="stylesheet" href="{% static 'css/fonts_override.css' %}">

    <link rel="stylesheet" href="{% static 'css/navbar.css' %}">
    <link rel="stylesheet" href="{% static 'platforms_app/css/platform_page.css' %}">
    <link rel="stylesheet" href="{% static 'platforms_app/js/leaflet/dist/leaflet.css' %}"
          crossorigin="">
    <link rel="stylesheet" href="{% static 'platforms_app/css/image_carousel.css' %}">

    <script type="module" src="{% static 'platforms_app/js/image_carousel.js' %}"></script>
    <script defer src="{% static 'js/alpine/packages/alpinejs/dist/cdn.min.js' %}"></script>


    <title>{% block title %}Platform {% endblock %}</title>
    <style>
        [x-cloak] {
            display: none !important;
        }
        .page-montserrat {
            font-family: "Montserrat", Arial, sans-serif;
        }
        .page-robotoslab {
            font-family: "Roboto Slab", Arial, sans-serif;
        }
    </style>
</head>
    <body class="page-montserrat">

    {% include "top_navbar_template.html" %}

    <main class="platform-detail-page" x-data="platformPage()">
        <section class="section platform-hero-section">
            <div class="container">
                {% block platform_header %}{% endblock %}
            </div>
        </section>

        <section class="section platform-content-section">
            <div class="container">
                <div class="columns is-variable is-6">
                    <aside class="column is-12-mobile is-5-tablet is-4-desktop is-3-widescreen">
                        <div class="platform-media-stack">
                            {% block platform_media %}{% endblock %}
                        </div>
                    </aside>

                    <section class="column is-12-mobile is-7-tablet is-8-desktop is-9-widescreen">
                        {% block platform_details %}{% endblock %}
                    </section>
                </div>
            </div>
        </section>

    </main>

    {% block extra_scripts %}{% endblock %}

</body>
</html>
