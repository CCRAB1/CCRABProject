{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Projects{% endblock %}</title>

    {# Bulma CSS #}
    <link rel="stylesheet" href="{% static 'css/bulma/css/versions/bulma-no-dark-mode.css' %}">
    <link rel="stylesheet" href="{% static 'css/navbar.css' %}">
    <link rel="preload" href="{% static 'fonts/montserrat/Montserrat-Regular.woff2' %}" as="font" type="font/woff2"
          crossorigin>
    <link rel="preload" href="{% static 'fonts/roboto-slab/RobotoSlab-Regular.woff2' %}" as="font" type="font/woff2"
          crossorigin>

    {# Small tweaks to match a “project detail page” feel #}
    <style>
        .project-hero {
            border-radius: 12px;
            overflow: hidden;
        }

        .meta-tile {
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 10px;
            padding: 0.9rem;
            height: 100%;
        }

        .gallery-card img {
            object-fit: cover;
        }

        .projects-top-nav .navbar {
            margin-bottom: 0;
        }
        .page-montserrat {
            font-family: "Montserrat", Arial, sans-serif;
        }

    </style>

    {% block extra_head %}{% endblock %}
</head>
<body class="page-montserrat">
    <div class="projects-top-nav">
        {% include "top_navbar_template.html" %}
    </div>

    <section class="section">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </section>

</body>
</html>
