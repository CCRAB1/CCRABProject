name: ccrabdashboard_new

services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-xenia_db}
      POSTGRES_USER: ${DATABASE_USER:-xenia_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-xenia_password}

    ports:
      - "5432:5432"

    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-xenia_user} -d ${DATABASE_NAME:-xenia_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ..
      dockerfile: infra/docker/dashboard/Dockerfile
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      DJANGO_IN_DOCKER: "True"
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
      DATABASE_NAME: ${DATABASE_NAME:-xenia_db}
      DATABASE_USER: ${DATABASE_USER:-xenia_user}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-xenia_password}
      DATABASE_HOST: db
      DATABASE_PORT: "${DATABASE_PORT:-5432}"
      DJANGO_WAIT_FOR_DB: "1"
      DJANGO_RUN_MIGRATIONS: "1"
      DJANGO_COLLECTSTATIC: "0"
    volumes:
      - ../apps/CCRABDashBoard:/app
    ports:
      - "${WEB_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_dev_data:
